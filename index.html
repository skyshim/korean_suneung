<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기출 트레이너 - 통합 관리 모드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .view-box { position: relative; }
        .view-box::before {
            content: "보기";
            position: absolute;
            top: -0.75rem;
            left: 1rem;
            background: white;
            padding: 0 0.5rem;
            font-size: 0.75rem;
            font-weight: bold;
            color: #94a3b8;
            border: 1px solid #e2e8f0;
            border-radius: 0.25rem;
        }
        @media (min-width: 1024px) {
            .passage-scroll { max-height: calc(100vh - 160px); overflow-y: auto; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <div id="app" class="max-w-7xl mx-auto p-4 md:p-6">
        <header class="flex justify-between items-center mb-6 border-b pb-4 border-slate-200">
            <div class="flex items-center gap-2 cursor-pointer" onclick="resetApp()">
                <div class="bg-indigo-600 p-2 rounded-lg text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M8 7h6"/><path d="M8 11h8"/></svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-indigo-900 leading-tight">기출 트레이너</h1>
                    <p class="text-xs text-slate-500">통합 데이터 관리 시스템</p>
                </div>
            </div>
            <div id="header-actions" class="flex gap-2"></div>
        </header>

        <main id="main-content"></main>
    </div>

    <script>
        // --- 데이터 설정 ---
        // 모든 카테고리에 공통으로 존재하는 파일 목록
        const availableFiles = ['dummy_passage.json', '2511.json', '2509.json'];

        const categories = [
            { id: 'lit', name: '문학', subs: ['고전산문', '고전시가', '현대시', '현대소설'] },
            { id: 'read', name: '독서', subs: ['독서론', '인문예술', '사회문화', '과학기술'] }
        ];

        let state = {
            currentPassage: null,
            userAnswers: {},
            showResults: false
        };

        // --- 렌더링 엔진 ---
        function render() {
            const main = document.getElementById('main-content');
            const headerActions = document.getElementById('header-actions');
            
            if (!state.currentPassage) {
                headerActions.innerHTML = ``;
                main.innerHTML = renderAdminPanel() + renderCategorySelection();
            } else {
                headerActions.innerHTML = `
                    <button onclick="resetApp()" class="flex items-center gap-2 text-slate-500 hover:text-indigo-600 transition-colors text-sm font-medium">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                        나가기
                    </button>
                `;
                main.innerHTML = renderPassageView();
            }
        }

        function renderAdminPanel() {
            return `
                <div class="mb-10 p-6 bg-white rounded-2xl border-2 border-dashed border-indigo-200 animate-in fade-in slide-in-from-top-4 duration-500">
                    <h2 class="text-lg font-bold text-indigo-900 mb-4 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        데이터 등록 도구
                    </h2>
                    <div class="grid gap-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-400 mb-1 uppercase">저장 카테고리</label>
                                <select id="save-sub" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:ring-2 ring-indigo-100">
                                    ${categories.flatMap(c => c.subs).map(s => `<option value="${s}">${s}</option>`).join('')}
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-400 mb-1 uppercase">파일명 (확장자 제외)</label>
                                <input type="text" id="save-filename" placeholder="예: 2511" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:ring-2 ring-indigo-100">
                            </div>
                        </div>
                        <textarea id="json-input" rows="4" class="w-full p-4 bg-slate-900 text-indigo-300 font-mono text-xs rounded-xl border-none" placeholder="AI가 생성한 JSON 데이터를 여기에 붙여넣으세요..."></textarea>
                        <button onclick="handleSaveJSON()" class="w-full py-3.5 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition-all">
                            JSON 파일 다운로드
                        </button>
                    </div>
                </div>
            `;
        }

        function renderCategorySelection() {
            return `
                <div class="animate-in fade-in slide-in-from-bottom-4 duration-700">
                    <div class="text-center mb-8">
                        <h2 class="text-2xl font-bold text-slate-800 mb-2">학습 제재 선택</h2>
                        <p class="text-slate-500 text-sm">등록된 기출 데이터(${availableFiles.length}종)를 기반으로 학습합니다.</p>
                    </div>
                    <div class="grid md:grid-cols-2 gap-6">
                        ${categories.map(cat => `
                            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                                <h3 class="text-lg font-bold mb-4 flex items-center gap-2 text-indigo-700">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                                    ${cat.name}
                                </h3>
                                <div class="grid grid-cols-2 gap-3">
                                    ${cat.subs.map(sub => `
                                        <button onclick="handlePickPassage('${sub}')" 
                                            class="p-4 text-left rounded-xl border border-slate-100 bg-slate-50/50 hover:border-indigo-400 hover:bg-indigo-50 transition-all group">
                                            <span class="text-sm font-bold block mb-1 text-slate-700 group-hover:text-indigo-700">${sub}</span>
                                            <span class="text-[10px] text-slate-400 flex items-center gap-1">
                                                <span class="w-1 h-1 rounded-full bg-indigo-400"></span> 기출 로드 가능
                                            </span>
                                        </button>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderPassageView() {
            const passage = state.currentPassage;
            const solvedAll = Object.keys(state.userAnswers).length === passage.questions.length;

            return `
                <div class="grid lg:grid-cols-2 gap-6 animate-in fade-in duration-500 items-start">
                    <div class="passage-scroll bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                        <div class="mb-6">
                            <div class="flex gap-2 mb-3">
                                <span class="px-2 py-0.5 rounded bg-indigo-600 text-white text-[10px] font-bold uppercase">${passage.year}</span>
                                <span class="px-2 py-0.5 rounded bg-slate-100 text-slate-500 text-[10px] font-bold uppercase border border-slate-200">${passage.subCategory}</span>
                            </div>
                            <h2 class="text-3xl font-bold text-slate-900 tracking-tight">${passage.title}</h2>
                        </div>
                        <div class="whitespace-pre-wrap leading-relaxed text-slate-700 text-lg font-serif">
                            ${passage.content}
                        </div>
                    </div>
                    <div class="space-y-6">
                        ${passage.questions.map((q, idx) => renderQuestion(q, idx)).join('')}
                        <div id="action-buttons" class="pt-4">
                            ${!state.showResults ? `
                                <button onclick="handleGrade()" ${!solvedAll ? 'disabled' : ''}
                                    class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 disabled:bg-slate-300 transition-all">
                                    채점하기 (${Object.keys(state.userAnswers).length} / ${passage.questions.length})
                                </button>
                            ` : `
                                <div class="flex flex-col sm:flex-row gap-3">
                                    <button onclick="handlePickPassage('${passage.subCategory}')" class="flex-1 py-4 bg-slate-800 text-white rounded-2xl font-bold hover:bg-slate-900 transition-all">다음 지문 (랜덤)</button>
                                    <button onclick="resetApp()" class="flex-1 py-4 bg-white border border-slate-200 text-slate-600 rounded-2xl font-bold hover:bg-slate-50 transition-all">메뉴로 이동</button>
                                </div>
                            `}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderQuestion(q, index) {
            const userAnswer = state.userAnswers[q.id];
            return `
                <div class="bg-white p-7 rounded-3xl shadow-sm border border-slate-200">
                    <div class="flex gap-3 mb-5">
                        <span class="font-black text-indigo-600 text-2xl">${index + 1}.</span>
                        <h3 class="font-bold text-lg text-slate-800 leading-snug">${q.text}</h3>
                    </div>
                    ${q.hasView ? `<div class="view-box bg-slate-50 border border-slate-200 p-5 rounded-2xl mb-6 text-sm font-serif italic text-slate-700 leading-relaxed">${q.viewContent}</div>` : ''}
                    <div class="space-y-2.5">
                        ${q.options.map((opt, optIdx) => {
                            const isSelected = userAnswer === optIdx;
                            const isCorrect = q.answer === optIdx;
                            let btnClass = "border-slate-100 bg-slate-50/30 hover:border-indigo-200 hover:bg-white";
                            if (state.showResults) {
                                if (isCorrect) btnClass = "bg-green-50 border-green-500 ring-1 ring-green-500";
                                else if (isSelected) btnClass = "bg-red-50 border-red-500";
                            } else if (isSelected) {
                                btnClass = "bg-indigo-50 border-indigo-500 ring-1 ring-indigo-500";
                            }
                            return `
                                <button onclick="handleSelectOption('${q.id}', ${optIdx})" ${state.showResults ? 'disabled' : ''}
                                    class="w-full text-left p-4 rounded-2xl border transition-all flex items-start gap-3 ${btnClass}">
                                    <span class="w-6 h-6 rounded-full border flex-shrink-0 flex items-center justify-center text-xs font-bold ${isSelected ? 'bg-indigo-600 text-white border-indigo-600' : 'border-slate-300 text-slate-400'}">${optIdx + 1}</span>
                                    <span class="text-[15px] font-medium text-slate-700">${opt}</span>
                                </button>
                            `;
                        }).join('')}
                    </div>
                    ${state.showResults ? `<div class="mt-5 p-5 bg-indigo-50 rounded-2xl text-sm border border-indigo-100 text-slate-700 leading-relaxed"><strong class="text-indigo-900 block mb-1">💡 정답 해설</strong>${q.explanation || '해설 정보가 없습니다.'}</div>` : ''}
                </div>
            `;
        }

        // --- 이벤트 핸들러 ---
        async function handlePickPassage(sub) {
            // 사용 가능한 파일들을 무작위로 섞어서 하나씩 시도 (동일한 파일이 모든 폴더에 있다고 가정)
            const shuffled = [...availableFiles].sort(() => Math.random() - 0.5);
            
            for (const filename of shuffled) {
                const filePath = `./json/${sub}/${filename}`;
                try {
                    const response = await fetch(filePath);
                    if (response.ok) {
                        const data = await response.json();
                        state.currentPassage = data;
                        state.userAnswers = {};
                        state.showResults = false;
                        render();
                        window.scrollTo(0, 0);
                        return;
                    }
                } catch (e) { continue; }
            }
            alert(`'${sub}' 폴더에서 파일을 찾을 수 없습니다.\n파일이 json/${sub}/ 폴더 안에 있는지 확인하세요.`);
        }

        function handleSaveJSON() {
            const sub = document.getElementById('save-sub').value;
            const filename = document.getElementById('save-filename').value;
            const jsonText = document.getElementById('json-input').value;

            if (!filename || !jsonText) return alert("데이터를 모두 입력해주세요.");

            try {
                const parsed = JSON.parse(jsonText);
                const blob = new Blob([JSON.stringify(parsed, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = `${filename}.json`;
                link.click();
                URL.revokeObjectURL(url);
                alert(`다운로드 완료! 'json/${sub}/' 폴더로 파일을 옮겨주세요.`);
            } catch (e) { alert("JSON 형식이 올바르지 않습니다."); }
        }

        function handleSelectOption(qId, idx) { if (!state.showResults) { state.userAnswers[qId] = idx; render(); } }
        function handleGrade() { state.showResults = true; render(); }
        function resetApp() { state.currentPassage = null; state.userAnswers = {}; state.showResults = false; render(); }

        render();
    </script>
</body>
</html>
